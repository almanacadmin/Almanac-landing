<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
  // Mirror of the check in index.html — if someone lands here directly on a wide,
  // non-touch (desktop) viewport, send them to the version tuned for that instead.
  (function () {
    // Uses pointer:coarse (the primary input's actual precision) rather than
    // 'ontouchstart' in window or navigator.maxTouchPoints — both of those are
    // known-unreliable: many real desktop browsers expose them as true/truthy
    // regardless of whether the device actually has touch, which would wrongly
    // redirect ordinary desktop visitors with a browser window in the 820-900px
    // range to the mobile build.
    var isMobile = window.matchMedia('(max-width: 820px)').matches ||
                   (window.matchMedia('(pointer: coarse)').matches && window.innerWidth <= 900);
    if (!isMobile) {
      location.replace('index.html');
    }
  })();
</script>
<title>/almanac — Signal Incoming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: oklch(8% .007 55);
    --cream: oklch(94% .013 80);
    --coral: #E8643A;
    --cream-dim: oklch(94% .013 80 / 0.28);
    --cx: -999px;
    --cy: -999px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
    cursor: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(
      ellipse 80% 75% at 50% 50%,
      transparent 40%,
      oklch(5% .005 55 / .55) 75%,
      oklch(4% .004 55 / .88) 100%
    );
    pointer-events: none;
    z-index: 30;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      oklch(0% 0 0 / 0.045) 2px,
      oklch(0% 0 0 / 0.045) 4px
    );
    pointer-events: none;
    z-index: 50;
  }

  canvas {
    position: fixed;
    inset: 0;
    display: block;
    z-index: 2;
  }

  #text-reveal {
    position: fixed;
    inset: 0;
    z-index: 15;
    pointer-events: none;
    /* Baseline is 10% everywhere rather than fully invisible, so the two
       taglines hint at their presence at all times. Full reveal (100%) only
       within a TIGHT zone right at the cursor — sharp jump, not a slow fade:
       opaque by just 12% of the ellipse radius, settled back to baseline by
       35%. Opacity only, no separate glow effect.
       Ellipse SIZE is a CSS variable (--reveal-w/--reveal-h) that JS sets
       based on proximity to the actual tagline elements — small/inert by
       default, large only when the cursor is genuinely near one of the two
       text zones, so a bigger reveal radius doesn't also light up while
       hovering over the central particle mark. See the mousemove handler. */
    -webkit-mask-image: radial-gradient(
      ellipse var(--reveal-w, 200px) var(--reveal-h, 260px) at var(--cx) var(--cy),
      black 0%,
      black 10%,
      rgba(0, 0, 0, 0.35) 45%,
      rgba(0, 0, 0, 0.35) 100%
    );
    mask-image: radial-gradient(
      ellipse var(--reveal-w, 200px) var(--reveal-h, 260px) at var(--cx) var(--cy),
      black 0%,
      black 10%,
      rgba(0, 0, 0, 0.35) 45%,
      rgba(0, 0, 0, 0.35) 100%
    );
  }

  .phrase {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: var(--cream);
    font-family: 'Inter Tight', sans-serif;
    font-weight: 300;
    line-height: 1.5;
    text-align: center;
    max-width: min(680px, 84vw);
    text-wrap: balance;
  }

  .phrase-top {
    top: 17%;
    /* Matches phrase-bottom's size exactly. Can't go bigger than this and still
       guarantee the bottom line holds to 2 lines on real phone widths — verified
       that even at near-edge-to-edge width, ~10px is the ceiling on the narrowest
       common phones (360px), so this is the top line coming down to meet that
       constraint rather than the bottom line being artificially undersized. */
    font-size: clamp(9px, 2.4vw, 17px);
  }

  .phrase-bottom {
    bottom: 17%;
    /* Sized for phone widths with a 20% safety buffer over the measured requirement,
       to account for the real "Inter Tight" webfont possibly rendering wider than
       the proxy font used to measure this. Verified across 360px-820px widths with
       30-130px of margin to spare at every point in that range. */
    font-size: clamp(9px, 2.4vw, 17px);
    max-width: min(760px, 97vw);
  }

  #cursor {
    position: fixed;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--coral);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 100;
    opacity: 0.9;
  }

  .ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  /* Wrapper no longer lays out its children (no flex/gap) — footer-mark and
     footer-copyright are now positioned independently below, each with their own
     bottom offset, so the gap ABOVE the monogram (to the tagline) and the gap
     BELOW the monogram (to the copyright line) can be made genuinely equal rather
     than the monogram just sitting stacked tight against the copyright line. This
     wrapper only exists so both fade in together as one unit. */
  .footer-block {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.8s ease;
    pointer-events: none;
  }

  .footer-block.visible { opacity: 1; }

  .footer-copyright {
    /* Anchored near the true page edge — a footer credit line's natural spot. */
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    line-height: 1.4; /* fixed rather than relying on the font's default, so the
      midpoint math below (which depends on this line's rendered height) is exact */
  }

  .footer-mark {
    /* Tagline's bottom edge sits at 17% from the page bottom (see .phrase-bottom).
       Copyright line is forced to always be exactly 2 lines on mobile (see the <br>
       in the markup) — height = 2 * (9px * 1.4 line-height) ≈ 25px. Its top edge
       therefore sits at 28px + 25px = 53px from the page bottom. True midpoint
       between the tagline's bottom (17%) and the copyright's top (53px) =
       (17% + 53px) / 2 = 8.5% + 26.5px. Monogram is 66px tall, so its own bottom
       edge = that midpoint minus half its height (33px) = 8.5% + 26.5px − 33px
       = 8.5% − 6.5px. */
    position: absolute;
    bottom: calc(8.5% - 6.5px);
    left: 50%;
    transform: translateX(-50%);
    height: 66px; /* 3x the original 22px */
    width: auto;
    display: block;
  }

  .footer-copyright {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: .1em;
    color: var(--cream-dim);
    text-align: center;
    max-width: 92vw; /* safety net only — the <br> in the markup is what forces the
      deterministic 2-line break; this just stops either half from clipping off-screen
      on an unusually narrow device instead of wrapping further if it ever needed to */
    white-space: normal;
  }
</style>
</head>

const rand = (a, b) => a + Math.random() * (b - a);

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

/* Maps a sampled RGB to the locked brand color it represents. The source PNG's own
   pixels drift warm on export — this keeps the on-screen result brand-correct regardless. */
function mapColor(r, g, b) {
  const isCoral = r > 200 && g < 200 && b < 180;
  return isCoral ? BRAND_CORAL : BRAND_CREAM;
}

/* Crops a sub-rectangle of the source image (in its native pixel space) and samples it
   into particle points scaled to targetSize on its dominant axis. */
function sampleRegion(img, srcX, srcY, srcW, srcH, targetSize, dominant, densityDivisor) {
  const aspect = srcW / srcH;
  let outW, outH;
  if (dominant === 'height') { outH = targetSize; outW = targetSize * aspect; }
  else { outW = targetSize; outH = outW / aspect; }

  const oc = document.createElement('canvas');
  oc.width = Math.ceil(outW);
  oc.height = Math.ceil(outH);
  const ox = oc.getContext('2d');
  ox.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, oc.width, oc.height);
  const data = ox.getImageData(0, 0, oc.width, oc.height).data;

  const pts = [];
  /* Step is always keyed to render HEIGHT, since letter/stroke detail scales with
     height regardless of how wide the overall composition is. Using width here for
     a short-wide wordmark was the bug that made "almanac" sample as near-invisible
     gaps — validated by rendering both ways before and after. */
  const step = Math.max(1, Math.round(outH / densityDivisor));
  for (let y = 0; y < oc.height; y += step) {
    for (let x = 0; x < oc.width; x += step) {
      const idx = (y * oc.width + x) * 4;
      if (data[idx + 3] > 120) {
        const [r, g, b] = mapColor(data[idx], data[idx + 1], data[idx + 2]);
        pts.push({ ox: x - oc.width / 2, oy: y - oc.height / 2, r, g, b });
      }
    }
  }
  return pts;
}

class Particle {
  constructor(x, y, ease = EASE, color = '#E8643A', sizeMin = 1.1, sizeMax = 2.0) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.tx = x; this.ty = y;
    this.ease  = ease;
    this.color = color;
    this.alpha = rand(0.78, 1.0);
    this.size  = rand(sizeMin, sizeMax);
    this.phase = rand(0, Math.PI * 2);
  }

  update(mx, my, t) {
    const dx = this.x - mx, dy = this.y - my;
    const d2 = dx * dx + dy * dy;
    if (d2 < REPEL_R * REPEL_R && d2 > 0.01) {
      const d = Math.sqrt(d2), frc = (1 - d / REPEL_R) * 5;
      this.vx += (dx / d) * frc;
      this.vy += (dy / d) * frc;
    }
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.78; this.vy *= 0.78;
    this.x += (this.tx - this.x) * this.ease;
    this.y += (this.ty - this.y) * this.ease;
    /* NOTE: no ambient wobble applied here anymore — it used to add a sin() term
       directly to this.x/this.y every frame, which is NOT self-correcting: measured
       it accumulating up to ~7.4px of drift from the assigned target in a slow ~7s
       cycle. With sample spacing as tight as 2-5px at current density, that drift
       was 2-4x bigger than the gap between neighboring particles — particles were
       routinely drifting into each other's lanes, blurring letterforms. Moved the
       wobble to draw() as a bounded cosmetic offset instead — see below. */
  }

  draw(ctx, t) {
    const pulse = 0.88 + 0.12 * Math.sin(t * 0.0015 + this.phase);
    const wobble = Math.sin(t * 0.0009 + this.phase) * 1.6; // small, bounded, purely visual
    ctx.globalAlpha = this.alpha * pulse;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x + wobble - this.size / 2, this.y + wobble - this.size / 2, this.size, this.size);
  }
}

class MarkField {
  constructor(ease = EASE) {
    this.ease = ease;
    this.particles = [];
    this.stateKey = null;
    this.cx = 0; this.cy = 0;
  }

  /* Used for both the first paint AND every later transition. Deliberately does NOT
     pair old particles to new targets by array index — with two shapes this different
     (tall narrow slash vs. wide short wordmark), index-based pairing has no real spatial
     meaning and was producing artifacts (particles clustering at a shared spawn point,
     particles reassigned across the screen with no correspondence to where they actually
     were). Instead: every particle for the new shape starts from a RANDOMLY SAMPLED point
     out of a pool of wherever the old shape's particles currently are (not a 1:1 pairing —
     just "start somewhere the old cloud was"), then eases to its own real destination.
     This keeps the organic flowing-cloud look without any identity/index correspondence
     for artifacts to hide in. First paint has no old shape to draw from, so it falls back
     to scattering near each particle's own destination. */
  setShape(pts, key, cx, cy, scatter = 60, sizeMin = 1.1, sizeMax = 2.0) {
    const startPool = this.particles.length ? this.particles.map(p => ({ x: p.x, y: p.y })) : null;
    this.stateKey = key;
    this.cx = cx; this.cy = cy;
    this.particles = pts.map(p => {
      const tx = this.cx + p.ox, ty = this.cy + p.oy;
      const color = `rgb(${p.r},${p.g},${p.b})`;
      let startX, startY;
      if (startPool) {
        const s = startPool[(Math.random() * startPool.length) | 0];
        startX = s.x; startY = s.y;
      } else {
        startX = tx + rand(-scatter, scatter); startY = ty + rand(-scatter, scatter);
      }
      const px = new Particle(startX, startY, this.ease, color, sizeMin, sizeMax);
      px.tx = tx; px.ty = ty;
      return px;
    });
  }

  /* Non-animated resize adjustment — same shape, new scale/position, no scatter flourish. */
  relayout(cx, cy, pts) {
    this.cx = cx; this.cy = cy;
    this.particles.forEach((p, i) => {
      if (pts[i]) { p.tx = cx + pts[i].ox; p.ty = cy + pts[i].oy; }
    });
  }

  update(mx, my, t) { this.particles.forEach(p => p.update(mx, my, t)); }
  draw(ctx, t) { this.particles.forEach(p => p.draw(ctx, t)); ctx.globalAlpha = 1; }
}

class NoiseParticle {
  constructor(W, H) { this.reset(W, H); this.y = rand(0, H); }
  reset(W, H) {
    this.W = W; this.H = H;
    this.x = rand(0, W); this.y = rand(0, H);
    this.vy = rand(0.08, 0.35); this.vx = rand(-0.05, 0.05);
    this.size = rand(0.8, 1.6); this.alpha = rand(0.02, 0.1);
    this.phase = rand(0, Math.PI * 2);
  }
  update(t) {
    this.y -= this.vy;
    this.x += this.vx + Math.sin(t * 0.0003 + this.phase) * 0.08;
    if (this.y < -4) { this.y = this.H + 4; this.x = rand(0, this.W); }
  }
  draw(ctx, t) {
    ctx.globalAlpha = this.alpha * (0.6 + 0.4 * Math.sin(t * 0.002 + this.phase));
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
let W, H, markField, wordmarkImg, comingSoonImg, noise, mx = -999, my = -999;

/* The original /coming soon asset (before cropping to just /soon) had this aspect
   ratio. We size the new, narrower /soon crop by HEIGHT against this reference so its
   letters render at the exact same physical scale they always did — sizing by width
   instead would stretch /soon's fewer glyphs to fill the old width budget, rendering
   them oversized. */
const OLD_COMINGSOON_ASPECT = 3385 / 620;

function layout() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const slashSize = Math.min(H * 0.42, 320);
  const fullWidth = Math.min(W * 0.86, 640);
  const comingSoonWidthBudget = Math.min(W * 0.86, 640);
  /* Matching the old letter-height exactly (comingSoonWidthBudget / OLD_COMINGSOON_ASPECT)
     is technically "the same size /coming soon always was," but /soon is a short word —
     at that height it reads as small and, on narrow phone widths, ends up with too few
     particles to hold a clean letterform. SIZE_BOOST scales it up so the word carries
     enough visual weight, and MIN_HEIGHT floors it so phones never drop below a size
     that can render legible strokes. Mobile uses a stronger boost and higher floor than
     desktop since phone widths are narrower to begin with. */
  const SIZE_BOOST = 1.4;
  const MIN_HEIGHT = 64;
  const comingSoonHeight = Math.max((comingSoonWidthBudget / OLD_COMINGSOON_ASPECT) * SIZE_BOOST, MIN_HEIGHT);
  const cx = W / 2, cy = H / 2; // every state centers on this same point

  return { cx, cy, slashSize, fullWidth, comingSoonHeight };
}

/* Density divisor is calibrated per-shape so all three have a comparable per-stroke
   sampling ratio (~12-13 particles across a stroke's own width) — otherwise a bolder
   typeface with thinner absolute strokes (like /coming soon's Neue Haas Bold) samples

function comingSoonPts() { return sampleComingSoon(ly.comingSoonHeight, 85); }

/* Per-phase particle size — reverted to a shared size across all three phases. */
const SIZE_RANGES = { slash: [1.1, 2.0], full: [1.1, 2.0], comingsoon: [1.1, 2.0] };

function ptsForPhase(idx) {
  if (idx === 0) return slashPts();
  if (idx === 1) return fullPts();
  return comingSoonPts();
}

/* Whatever should be showing right now, given current state — used by resize. */
function currentPts() { return ptsForPhase(phaseIndex); }

async function init() {
  wordmarkImg = await loadImage(WORDMARK_SRC);
  comingSoonImg = await loadImage(COMINGSOON_SRC);
  await document.fonts.load(`300 100px 'Inter Tight'`); // guards HUD/phrase text against a fallback font
  ly = layout();
  markField = new MarkField(0.035);
  markField.setShape(slashPts(), 'slash', ly.cx, ly.cy, 60, ...SIZE_RANGES.slash);
  noise = Array.from({ length: NOISE_COUNT }, () => new NoiseParticle(W, H));
  requestAnimationFrame(loop);

  setTimeout(() => {
    document.getElementById('footer-block').classList.add('visible');
  }, 2000);

  // Ambient autonomous cycle: "/" -> "/almanac" -> "/coming soon" -> repeat, on its own.
  // No cursor involvement of any kind — this is the only way any of the three appears.
  setInterval(() => {
    phaseIndex = (phaseIndex + 1) % PHASES.length;
    markField.setShape(ptsForPhase(phaseIndex), PHASES[phaseIndex], ly.cx, ly.cy, 60, ...SIZE_RANGES[PHASES[phaseIndex]]);
  }, 4500);
}

let t = 0;
let targetCX = -999, targetCY = -999;
let curCX = -999, curCY = -999;
let targetRW = 200, targetRH = 260;
let curRW = 200, curRH = 260;
const REVEAL_EASE = 0.12; // lower = smoother/laggier follow, higher = snappier

function loop(ts) {
  t = ts;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = COL_NOISE;
  noise.forEach(n => { n.update(t); n.draw(ctx, t); });
  ctx.globalAlpha = 1;
  if (markField) {
    markField.update(mx, my, t);
    markField.draw(ctx, t);
  }

  // Ease the flashlight position/size toward their targets every frame, instead of
  // snapping straight to the raw mousemove coordinates — this is what makes the
  // text reveal glide instead of jump.
  curCX += (targetCX - curCX) * REVEAL_EASE;
  curCY += (targetCY - curCY) * REVEAL_EASE;
  curRW += (targetRW - curRW) * REVEAL_EASE;
  curRH += (targetRH - curRH) * REVEAL_EASE;
  document.documentElement.style.setProperty('--cx', curCX + 'px');
  document.documentElement.style.setProperty('--cy', curCY + 'px');
  document.documentElement.style.setProperty('--reveal-w', curRW + 'px');
  document.documentElement.style.setProperty('--reveal-h', curRH + 'px');

  requestAnimationFrame(loop);
}

const topPhraseEl = document.querySelector('.phrase-top');
const bottomPhraseEl = document.querySelector('.phrase-bottom');

/* Live auto-fit sizing, replacing/backstopping the static CSS clamp() values above.
   Those clamp() numbers were tuned against a *proxy* font at a handful of sample
   widths — reasonable, but still a guess. This instead measures the real rendered
   width of the real text in the real loaded "Inter Tight" webfont, at whatever the
   device's actual width is right now, and binary-searches the largest font-size
   that still fits every line within its container. Runs once fonts are confirmed
   loaded, and again on resize/rotation, so it self-corrects on any screen instead
   of relying on pre-computed breakpoints. The CSS clamp() values remain as the
   fallback for the brief moment before this runs, or if JS is unavailable. */
(function setupAutoFitText() {
  const measureCanvas = document.createElement('canvas');
  const mctx = measureCanvas.getContext('2d');

  function htmlToText(html) {
    const d = document.createElement('div');
    d.innerHTML = html;
    return d.textContent;
  }

  function getLines(el) {
    // Splits on manual <br> tags in the markup and decodes entities (&nbsp; etc.)
    // for each resulting piece.
    return el.innerHTML.split(/<br\s*\/?>/i).map(htmlToText);
  }

  function measureWidth(text, fontPx) {
    mctx.font = `300 ${fontPx}px 'Inter Tight'`;
    return mctx.measureText(text).width;
  }

  function fitFontSize(items, minPx, maxPx) {
    // items: [{ text, maxWidth }, ...] — finds the largest shared size where every
    // item's text fits within its own container's max-width.
    let lo = minPx, hi = maxPx;
    for (let i = 0; i < 22; i++) {
      const mid = (lo + hi) / 2;
      const fits = items.every(it => measureWidth(it.text, mid) <= it.maxWidth);
      if (fits) lo = mid; else hi = mid;
    }
    return Math.floor(lo * 10) / 10; // round down slightly, never up past the fit point
  }

  function apply() {
    const topMaxWidth = parseFloat(getComputedStyle(topPhraseEl).maxWidth);
    const bottomMaxWidth = parseFloat(getComputedStyle(bottomPhraseEl).maxWidth);

    const items = [
      { text: htmlToText(topPhraseEl.innerHTML), maxWidth: topMaxWidth },
      ...getLines(bottomPhraseEl).map(text => ({ text, maxWidth: bottomMaxWidth })),
    ];

    let size = fitFontSize(items, 8, 24);

    /* Vertical constraint. The check above only asks "does this font fit the width
       of its line" — fine in portrait, but in LANDSCAPE (wide but short) it happily
       returns a large size since there's plenty of width, and that large text block
       then doesn't fit the short vertical space and overlaps the particle mark.
       Compute the actual vertical room between each tagline's CSS anchor (top:17% /
       bottom:17%, matching the stylesheet) and the mark's real bounds (ly.cy ±
       ly.slashSize/2, the same values the particle system itself uses), and cap the
       font size to whatever both the top and bottom taglines can fit within,
       with a small breathing-room pad so text doesn't touch the mark edge exactly. */
    const H = window.innerHeight;
    const layoutNow = (typeof ly !== 'undefined' && ly) ? ly : layout();
    const PAD = 10;
    const LINE_HEIGHT = 1.5;
    const topAnchorPx = 0.17 * H;
    const bottomAnchorPx = H - 0.17 * H;
    const markTop = layoutNow.cy - layoutNow.slashSize / 2;
    const markBottom = layoutNow.cy + layoutNow.slashSize / 2;

    const topVerticalRoom = markTop - topAnchorPx - PAD;
    const bottomVerticalRoom = bottomAnchorPx - markBottom - PAD;

    const topMaxByHeight = topVerticalRoom / (LINE_HEIGHT * 1);   // top phrase: 1 line
    const bottomMaxByHeight = bottomVerticalRoom / (LINE_HEIGHT * 2); // bottom phrase: 2 lines

    size = Math.min(size, topMaxByHeight, bottomMaxByHeight);
    size = Math.max(size, 8); // never collapse below a legible floor even in extreme cases

    topPhraseEl.style.fontSize = size + 'px';
    bottomPhraseEl.style.fontSize = size + 'px';
  }

  function ready() {
    if (document.fonts && document.fonts.load) {
      // Explicitly request the exact weight/family used, so .ready doesn't resolve
      // before this specific font has actually finished loading.
      Promise.all([
        document.fonts.load("300 16px 'Inter Tight'"),
        document.fonts.ready,
      ]).then(apply).catch(apply);
    } else {
      apply();
    }
  }

  ready();
  let resizeT;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(apply, 120);
  });
  window.addEventListener('orientationchange', () => setTimeout(apply, 120));
})();

const REVEAL_SMALL = { w: 280, h: 340 };
const REVEAL_BIG   = { w: 460, h: 400 };
const TEXT_ZONE_PAD = 240; // wider than desktop — a fingertip is blunt, give it more margin to count as "near"

function nearElement(el, x, y, pad) {
  const r = el.getBoundingClientRect();
  return x >= r.left - pad && x <= r.right + pad && y >= r.top - pad && y <= r.bottom + pad;
}

function updatePointer(x, y) {
  mx = x; my = y;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  targetCX = mx;
  targetCY = my;

  const nearText = nearElement(topPhraseEl, mx, my, TEXT_ZONE_PAD) || nearElement(bottomPhraseEl, mx, my, TEXT_ZONE_PAD);
  const size = nearText ? REVEAL_BIG : REVEAL_SMALL;
  targetRW = size.w;
  targetRH = size.h;
}

function clearPointer() {
  mx = -9999; my = -9999;
  targetCX = -999;
  targetCY = -999;
}

window.addEventListener('mousemove', e => updatePointer(e.clientX, e.clientY));
window.addEventListener('mouseleave', clearPointer);

// Touch support: mirrors the mouse behavior above so the particle repel/reveal
// effect responds to a finger the same way it responds to a cursor. preventDefault
// on touchstart/touchmove stops the page from scrolling or triggering pull-to-refresh
// while someone's dragging a finger across the piece — this page has no scrollable
// content, so there's nothing lost by suppressing the default gesture. { passive: false }
// is required for preventDefault to actually take effect on touch listeners.
function touchPoint(e) {
  const t = e.touches[0] || e.changedTouches[0];
  return t ? { x: t.clientX, y: t.clientY } : null;
}

window.addEventListener('touchstart', e => {
  const p = touchPoint(e);
  if (p) updatePointer(p.x, p.y);
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', e => {
  const p = touchPoint(e);
  if (p) updatePointer(p.x, p.y);
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', clearPointer, { passive: true });
window.addEventListener('touchcancel', clearPointer, { passive: true });
