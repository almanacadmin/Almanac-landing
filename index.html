<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: oklch(8% .007 55);
    --cream: oklch(94% .013 80);
    --coral: #E8643A;
    --cream-dim: oklch(94% .013 80 / 0.28);
    --cx: -999px;
    --cy: -999px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
    cursor: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(
      ellipse 80% 75% at 50% 50%,
      transparent 40%,
      oklch(5% .005 55 / .55) 75%,
      oklch(4% .004 55 / .88) 100%
    );
    pointer-events: none;
    z-index: 30;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      oklch(0% 0 0 / 0.045) 2px,
      oklch(0% 0 0 / 0.045) 4px
    );
    pointer-events: none;
    z-index: 50;
  }

  canvas {
    position: fixed;
    inset: 0;
    display: block;
    z-index: 2;
  }

  #text-reveal {
    position: fixed;
    inset: 0;
    z-index: 15;
    pointer-events: none;
    /* Baseline is 10% everywhere rather than fully invisible, so the two
       taglines hint at their presence at all times. Full reveal (100%) only
       within a TIGHT zone right at the cursor — sharp jump, not a slow fade:
       opaque by just 12% of the ellipse radius, settled back to baseline by
       35%. Opacity only, no separate glow effect.
       Ellipse SIZE is a CSS variable (--reveal-w/--reveal-h) that JS sets
       based on proximity to the actual tagline elements — small/inert by
       default, large only when the cursor is genuinely near one of the two
       text zones, so a bigger reveal radius doesn't also light up while
       hovering over the central particle mark. See the mousemove handler. */
    -webkit-mask-image: radial-gradient(
      ellipse var(--reveal-w, 200px) var(--reveal-h, 260px) at var(--cx) var(--cy),
      black 0%,
      black 12%,
      rgba(0, 0, 0, 0.10) 35%,
      rgba(0, 0, 0, 0.10) 100%
    );
    mask-image: radial-gradient(
      ellipse var(--reveal-w, 200px) var(--reveal-h, 260px) at var(--cx) var(--cy),
      black 0%,
      black 12%,
      rgba(0, 0, 0, 0.10) 35%,
      rgba(0, 0, 0, 0.10) 100%
    );
  }

  .phrase {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: var(--cream);
    font-family: 'Inter Tight', sans-serif;
    font-weight: 300;
    line-height: 1.5;
    text-align: center;
    max-width: min(680px, 84vw);
    text-wrap: balance;
  }

  .phrase-top {
    top: 12%;
    font-size: clamp(17px, 1.9vw, 24px);
  }

  .phrase-bottom {
    bottom: 12%;
    font-size: clamp(17px, 1.9vw, 24px);
  }

  #cursor {
    position: fixed;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--coral);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 100;
    opacity: 0.9;
  }

  .ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  .footer-mark {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    height: 22px;
    width: auto;
    opacity: 0;
    transition: opacity 1.8s ease;
  }

  .footer-mark.visible { opacity: 1; }
</style>
</head>

  const data = ox.getImageData(0, 0, oc.width, oc.height).data;

  const pts = [];
  /* Step is always keyed to render HEIGHT, since letter/stroke detail scales with
     height regardless of how wide the overall composition is. Using width here for
     a short-wide wordmark was the bug that made "almanac" sample as near-invisible
     gaps — validated by rendering both ways before and after. */
  const step = Math.max(1, Math.round(outH / densityDivisor));
  for (let y = 0; y < oc.height; y += step) {
    for (let x = 0; x < oc.width; x += step) {
      const idx = (y * oc.width + x) * 4;
      if (data[idx + 3] > 120) {
        const [r, g, b] = mapColor(data[idx], data[idx + 1], data[idx + 2]);
        pts.push({ ox: x - oc.width / 2, oy: y - oc.height / 2, r, g, b });
      }
    }
  }
  return pts;
}

/* Native-pixel regions within AWhite-Logo.png (528x137 source), found via connected-
   component analysis: the slash is an isolated tall blob, fully separate from the dot
   and lettering. Cropping to just this box gives the idle "/" identical pixels to the
   one that appears inside the full wordmark — no shape jump on morph, only scale/position. */
const SLASH_REGION = { x: 0, y: 0, w: 62, h: 137 };
const FULL_REGION  = { x: 0, y: 0, w: 528, h: 137 };

/* Real production asset for "/coming soon" (Coming_soon_White.png, 4320x4320 source) —
   slash + text already correctly proportioned together by the designer, exactly like
   AWhite-Logo.png is for "/almanac". Tight bounding box found the same way SLASH_REGION/
   FULL_REGION were: measure actual non-transparent content, not the full canvas. This
   REPLACES the earlier approach of reconstructing "coming soon" from canvas-rendered
   Neue Haas Bold text next to a separately-scaled slash crop — that reconstruction
   was the root cause of the "/" rendering at the wrong scale (see prior handoff entry).
   Using the real asset directly eliminates that whole category of proportion mismatch. */
const COMINGSOON_REGION = { x: 468, y: 1850, w: 3385, h: 620 };

/* Source pixels: slash is #FF7F50 (the recurring export-drift color, same issue as
   AWhite-Logo.png — remapped to the locked #E8643A via mapColor()), text is pure white
   #FFFFFF (remapped to the established --cream token via the same function, since white
   pixels fail the "coral-ish" test and fall through to the BRAND_CREAM branch). */
function sampleComingSoon(targetWidth, densityDivisor) {
  const aspect = COMINGSOON_REGION.w / COMINGSOON_REGION.h;
  const outW = targetWidth;
  const outH = outW / aspect;

  const oc = document.createElement('canvas');
  oc.width = Math.ceil(outW);
  oc.height = Math.ceil(outH);
  const ox = oc.getContext('2d');
  ox.drawImage(comingSoonImg, COMINGSOON_REGION.x, COMINGSOON_REGION.y, COMINGSOON_REGION.w, COMINGSOON_REGION.h,
               0, 0, oc.width, oc.height);
  const data = ox.getImageData(0, 0, oc.width, oc.height).data;

  const pts = [];
  /* Divisor calibrated against the real asset's own measured stroke widths (slash
     ~92px, letter stems ~89px at native resolution) targeting the same ~12-13
     samples-across-stroke ratio established for /almanac — both strokes came out
     needing nearly the same divisor (84-87), confirming the real asset's proportions
     are already internally consistent, unlike the reconstructed version. */
  const step = Math.max(1, Math.round(outH / densityDivisor));
  for (let y = 0; y < oc.height; y += step) {
    for (let x = 0; x < oc.width; x += step) {
      const idx = (y * oc.width + x) * 4;
      if (data[idx + 3] > 120) {
        const [r, g, b] = mapColor(data[idx], data[idx + 1], data[idx + 2]);
        pts.push({ ox: x - oc.width / 2, oy: y - oc.height / 2, r, g, b });
      }
    }
  }
  return pts;
}

class Particle {
  constructor(x, y, ease = EASE, color = '#E8643A', sizeMin = 1.1, sizeMax = 2.0) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.tx = x; this.ty = y;
    this.ease  = ease;
    this.color = color;
    this.alpha = rand(0.78, 1.0);
    this.size  = rand(sizeMin, sizeMax);
    this.phase = rand(0, Math.PI * 2);
  }

  update(mx, my, t) {
    const dx = this.x - mx, dy = this.y - my;
    const d2 = dx * dx + dy * dy;
    if (d2 < REPEL_R * REPEL_R && d2 > 0.01) {
      const d = Math.sqrt(d2), frc = (1 - d / REPEL_R) * 5;
      this.vx += (dx / d) * frc;
      this.vy += (dy / d) * frc;
    }
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.78; this.vy *= 0.78;
    this.x += (this.tx - this.x) * this.ease;
    this.y += (this.ty - this.y) * this.ease;
    /* NOTE: no ambient wobble applied here anymore — it used to add a sin() term
       directly to this.x/this.y every frame, which is NOT self-correcting: measured
       it accumulating up to ~7.4px of drift from the assigned target in a slow ~7s
       cycle. With sample spacing as tight as 2-5px at current density, that drift
       was 2-4x bigger than the gap between neighboring particles — particles were
       routinely drifting into each other's lanes, blurring letterforms. Moved the
       wobble to draw() as a bounded cosmetic offset instead — see below. */
  }

  draw(ctx, t) {
    const pulse = 0.88 + 0.12 * Math.sin(t * 0.0015 + this.phase);
    const wobble = Math.sin(t * 0.0009 + this.phase) * 0.9; // small, bounded, purely visual
    ctx.globalAlpha = this.alpha * pulse;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x + wobble - this.size / 2, this.y + wobble - this.size / 2, this.size, this.size);
  }
}

class MarkField {
  constructor(ease = EASE) {
    this.ease = ease;
    this.particles = [];
    this.stateKey = null;
    this.cx = 0; this.cy = 0;
  }

  /* Used for both the first paint AND every later transition. Deliberately does NOT
     pair old particles to new targets by array index — with two shapes this different
     (tall narrow slash vs. wide short wordmark), index-based pairing has no real spatial
     meaning and was producing artifacts (particles clustering at a shared spawn point,
     particles reassigned across the screen with no correspondence to where they actually
     were). Instead: every particle for the new shape starts from a RANDOMLY SAMPLED point
     out of a pool of wherever the old shape's particles currently are (not a 1:1 pairing —
     just "start somewhere the old cloud was"), then eases to its own real destination.
     This keeps the organic flowing-cloud look without any identity/index correspondence
     for artifacts to hide in. First paint has no old shape to draw from, so it falls back
     to scattering near each particle's own destination. */
  setShape(pts, key, cx, cy, scatter = 60, sizeMin = 1.1, sizeMax = 2.0) {
    const startPool = this.particles.length ? this.particles.map(p => ({ x: p.x, y: p.y })) : null;
    this.stateKey = key;
    this.cx = cx; this.cy = cy;
    this.particles = pts.map(p => {
      const tx = this.cx + p.ox, ty = this.cy + p.oy;
      const color = `rgb(${p.r},${p.g},${p.b})`;
      let startX, startY;
      if (startPool) {
        const s = startPool[(Math.random() * startPool.length) | 0];
        startX = s.x; startY = s.y;
      } else {
        startX = tx + rand(-scatter, scatter); startY = ty + rand(-scatter, scatter);
      }
      const px = new Particle(startX, startY, this.ease, color, sizeMin, sizeMax);
      px.tx = tx; px.ty = ty;
      return px;
    });
  }

  /* Non-animated resize adjustment — same shape, new scale/position, no scatter flourish. */
  relayout(cx, cy, pts) {
    this.cx = cx; this.cy = cy;
    this.particles.forEach((p, i) => {
      if (pts[i]) { p.tx = cx + pts[i].ox; p.ty = cy + pts[i].oy; }
    });
  }

  update(mx, my, t) { this.particles.forEach(p => p.update(mx, my, t)); }
  draw(ctx, t) { this.particles.forEach(p => p.draw(ctx, t)); ctx.globalAlpha = 1; }
}

class NoiseParticle {
  constructor(W, H) { this.reset(W, H); this.y = rand(0, H); }
  reset(W, H) {
    this.W = W; this.H = H;
    this.x = rand(0, W); this.y = rand(0, H);
    this.vy = rand(0.08, 0.35); this.vx = rand(-0.05, 0.05);
    this.size = rand(0.8, 1.6); this.alpha = rand(0.02, 0.1);
    this.phase = rand(0, Math.PI * 2);
  }
  update(t) {
    this.y -= this.vy;
    this.x += this.vx + Math.sin(t * 0.0003 + this.phase) * 0.08;
    if (this.y < -4) { this.y = this.H + 4; this.x = rand(0, this.W); }
  }
  draw(ctx, t) {
    ctx.globalAlpha = this.alpha * (0.6 + 0.4 * Math.sin(t * 0.002 + this.phase));
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

AAAAAAAAAAAAAAAAAAAIA0AQcAAAAAAAAAAAAAAAAAAAAAaQIOAAAAAAAAAAAAAAAAAAAAANIEHAAAAAAAAAAAAAAAAAAAAACkCTgAAAAAAAAAAAAAAAAAAAAASBNwAAAAAAAAAAAAAAAAAAAAAJAm4AAAAAAAAAAAAAAAAAAAAAAgTcABAAAAAAAAAAAAAAAAAAAAQJqAAwAAAAAAAAAAAAAAAAAAAIA0AQcAAAAAAAAAAAAAAAAAAAAAaQIOAAAAAAAAAAAAAAAAAAAAANIEHAAAAAAAAAAAAAAAAAAAAACkCTgAAAAAAAAAAAAAAAAAAAAASBNwAAAAAAAAAAAAAAAAAAAAAJAm4AAAAAAAAAAAAAAAAAAAAAAgTcABAAAAAAAAAAAAAAAAAAAAQJqAAwAAAAAAAAAAAAAAAAAAAIA0AQcAAAAAAAAAAAAAAAAAAAAAaQIOAAAAAAAAAAAAAAAAAAAAANIEHAAAAAAAAAAAAAAAAAAAAACkCTgAAAAAAAAAAAAAAAAAAAAASBNwAAAAAAAAAAAAAAAAAAAAAJAm4AAAAAAAAAAAAAAAAAAAAAAgTcABAAAAAAAAAAAAAAAAAAAAQJqAAwAAAAAAAAAAAAAAAAAAAIA0AQcAAAAAAAAAAAAAAAAAAAAAaQIOAAAAAAAAAAAAAAAAAAAAANIEHAAAAAAAAAAAAAAAAAAAAACkCTgAAAAAAAAAAAAAAAAAAAAASBNwAAAAAAAAAAAAAAAAAAAAAJAm4AAAAAAAAAAAAAAAAAAAAAAgTcABAAAAAAAAAAAAAAAAAAAAQJqAAwAAAAAAAAAAAAAAAAAAAIA0AQcAAAAAAAAAAAAAAAAAAAAAaQIOAAAAAAAAAAAAAAAAAAAAANIEHAAAAAAAAAAAAAAAAAAAAACkCTgAAAAAAAAAAAAAAAAAAAAASBNwAAAAAAAAAAAAAAAAAAAAALCyA6t/QzgL9HAQAAAAAElFTkSuQmCC';
function comingSoonPts() { return sampleComingSoon(ly.comingSoonWidth, 85); }

/* Per-phase particle size — reverted to a shared size across all three phases. */
const SIZE_RANGES = { slash: [1.1, 2.0], full: [1.1, 2.0], comingsoon: [1.1, 2.0] };

function ptsForPhase(idx) {
  if (idx === 0) return slashPts();
  if (idx === 1) return fullPts();
  return comingSoonPts();
}

/* Whatever should be showing right now, given current state — used by resize. */
function currentPts() { return ptsForPhase(phaseIndex); }

async function init() {
  wordmarkImg = await loadImage(WORDMARK_SRC);
  comingSoonImg = await loadImage(COMINGSOON_SRC);
  await document.fonts.load(`300 100px 'Inter Tight'`); // guards HUD/phrase text against a fallback font
  ly = layout();
  markField = new MarkField(0.035);
  markField.setShape(slashPts(), 'slash', ly.cx, ly.cy, 60, ...SIZE_RANGES.slash);
  noise = Array.from({ length: NOISE_COUNT }, () => new NoiseParticle(W, H));
  requestAnimationFrame(loop);

  setTimeout(() => {
    document.getElementById('footer-monogram').classList.add('visible');
  }, 2000);

  // Ambient autonomous cycle: "/" -> "/almanac" -> "/coming soon" -> repeat, on its own.
  // No cursor involvement of any kind — this is the only way any of the three appears.
  setInterval(() => {
    phaseIndex = (phaseIndex + 1) % PHASES.length;
    markField.setShape(ptsForPhase(phaseIndex), PHASES[phaseIndex], ly.cx, ly.cy, 60, ...SIZE_RANGES[PHASES[phaseIndex]]);
  }, 4500);
}

let t = 0;
function loop(ts) {
  t = ts;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = COL_NOISE;
  noise.forEach(n => { n.update(t); n.draw(ctx, t); });
  ctx.globalAlpha = 1;
  if (markField) {
    markField.update(mx, my, t);
    markField.draw(ctx, t);
  }
  requestAnimationFrame(loop);
}

const topPhraseEl = document.querySelector('.phrase-top');
const bottomPhraseEl = document.querySelector('.phrase-bottom');
const REVEAL_SMALL = { w: 200, h: 260 };
const REVEAL_BIG   = { w: 600, h: 480 };
const TEXT_ZONE_PAD = 180; // generous padding around each tagline's own box — "near enough" to count

function nearElement(el, x, y, pad) {
  const r = el.getBoundingClientRect();
  return x >= r.left - pad && x <= r.right + pad && y >= r.top - pad && y <= r.bottom + pad;
}

window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  document.documentElement.style.setProperty('--cx', mx + 'px');
  document.documentElement.style.setProperty('--cy', my + 'px');

  const nearText = nearElement(topPhraseEl, mx, my, TEXT_ZONE_PAD) || nearElement(bottomPhraseEl, mx, my, TEXT_ZONE_PAD);
  const size = nearText ? REVEAL_BIG : REVEAL_SMALL;
  document.documentElement.style.setProperty('--reveal-w', size.w + 'px');
  document.documentElement.style.setProperty('--reveal-h', size.h + 'px');
});

window.addEventListener('mouseleave', () => {
  mx = -9999; my = -9999;
  document.documentElement.style.setProperty('--cx', '-999px');
  document.documentElement.style.setProperty('--cy', '-999px');
});

window.addEventListener('resize', () => {
  if (!markField || !wordmarkImg) return;
  ly = layout();
  markField.relayout(ly.cx, ly.cy, currentPts());
  noise.forEach(n => { n.W = W; n.H = H; });
});


init();
})();
